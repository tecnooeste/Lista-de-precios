<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lista de Precios — Tecno.Oeste</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f7f7f5;
      --header-bg: #1e2124;
      --cat-bg: #2d3035;
      --cat-text: #ffffff;
      --row-hover: #f0f4ff;
      --border: #d8d8d4;
      --text: #1a1a18;
      --muted: #888;
      --accent: #1a6fff;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'IBM Plex Sans', sans-serif;
    }
    html { scroll-behavior: smooth; }
    body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }

    nav {
      background: var(--header-bg); padding: 0 2rem; height: 54px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 50;
    }
    .logo { font-family: var(--mono); font-size: 15px; font-weight: 500; color: #fff; text-decoration: none; }
    .logo span { color: #5b9eff; }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .tc-display { font-family: var(--mono); font-size: 11px; color: #aaa; background: #2d3035; padding: 5px 12px; border-radius: 4px; }
    .tc-display strong { color: #5b9eff; }

    .page-header { background: var(--header-bg); padding: 2.5rem 2rem 2rem; border-bottom: 3px solid #3a3f45; }
    .page-header h1 { font-family: var(--sans); font-weight: 300; font-size: 2rem; color: #fff; letter-spacing: -0.03em; margin-bottom: 6px; }
    .page-header p { font-family: var(--mono); font-size: 11px; color: #666; letter-spacing: 0.06em; text-transform: uppercase; }

    .controls { max-width: 1200px; margin: 0 auto; padding: 1.25rem 2rem; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .search-wrap { flex: 1; min-width: 200px; position: relative; }
    .search-wrap input {
      width: 100%; font-family: var(--mono); font-size: 13px;
      padding: 8px 12px 8px 34px; border: 1px solid var(--border);
      border-radius: 4px; background: #fff; color: var(--text); outline: none;
    }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 14px; pointer-events: none; }
    .filter-chips { display: flex; gap: 6px; flex-wrap: wrap; }
    .chip {
      font-family: var(--mono); font-size: 11px; padding: 5px 12px;
      border: 1px solid var(--border); border-radius: 999px;
      background: transparent; color: var(--muted); cursor: pointer;
      letter-spacing: 0.03em; transition: all 0.12s; white-space: nowrap;
    }
    .chip:hover { color: var(--text); border-color: #aaa; }
    .chip.active { background: var(--header-bg); color: #fff; border-color: var(--header-bg); }

    .table-wrap { max-width: 1200px; margin: 0 auto 3rem; padding: 0 2rem; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); background: #fff; }
    thead tr { background: var(--header-bg); }
    thead th {
      font-family: var(--mono); font-size: 11px; font-weight: 500;
      color: #ccc; text-transform: uppercase; letter-spacing: 0.08em;
      padding: 12px 16px; text-align: left; border-right: 1px solid #3a3f45; white-space: nowrap;
    }
    thead th:last-child { border-right: none; }
    tbody tr { transition: background 0.1s; }
    tbody tr:hover { background: var(--row-hover) !important; }
    td { padding: 10px 16px; border-bottom: 1px solid var(--border); border-right: 1px solid #ebebeb; vertical-align: middle; }
    td:last-child { border-right: none; }
    tr:last-child td { border-bottom: none; }

    .cat-row td { background: var(--cat-bg); color: var(--cat-text); font-weight: 500; font-size: 13px; padding: 9px 16px; }
    .group-a td { background: #fefefe; }
    .group-b td { background: #fdf9ec; }
    .group-a:hover td, .group-b:hover td { background: var(--row-hover) !important; }

    .product-cell { font-size: 13.5px; color: var(--text); }
    .price-usd { font-family: var(--mono); font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; text-align: right; }
    .price-ars { font-family: var(--mono); font-size: 13px; font-weight: 500; color: #1a6fff; white-space: nowrap; text-align: right; }

    col.col-usd  { width: 100px; }
    col.col-ars  { width: 130px; }

    .empty-row td { text-align: center; padding: 3rem; color: var(--muted); font-family: var(--mono); font-size: 13px; }

    .page-footer { max-width: 1200px; margin: 0 auto 2rem; padding: 0 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
    .footer-count { font-family: var(--mono); font-size: 12px; color: var(--muted); }

    @media (max-width: 700px) {
      nav { padding: 0 1rem; }
      .page-header { padding: 1.5rem 1rem 1.25rem; }
      .controls, .table-wrap, .page-footer { padding-left: 1rem; padding-right: 1rem; }
    }
  </style>
</head>
<body>

<nav>
  <a href="#" class="logo">Tecno<span>.</span>Oeste</a>
  <div class="nav-right">
    <div class="tc-display">USD → ARS: <strong id="tc-nav">$Cargando...</strong></div>
  </div>
</nav>

<div class="page-header">
  <h1>Lista de precios</h1>
  <p id="fecha-header">Actualizado: — · Precios en USD y ARS</p>
</div>

<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="search" placeholder="Buscar producto..." oninput="applyFilters()" />
  </div>
  <div class="filter-chips" id="chips"></div>
</div>

<div class="table-wrap">
  <table>
    <colgroup>
      <col />
      <col class="col-usd" />
      <col class="col-ars" />
    </colgroup>
    <thead>
      <tr>
        <th>Producto</th>
        <th style="text-align:right;">Precio USD</th>
        <th style="text-align:right;">Precio ARS</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div class="page-footer">
  <span class="footer-count" id="footer-count"></span>
  <span class="footer-count">Tecno.Oeste &copy; 2025</span>
</div>

<script>
// CONFIGURACIÓN DE GOOGLE SHEETS
const SHEET_ID = "1NzYu2WBVc0JiYDmA_SYF-s1_jHmw63lR51zNXDWu29A";
const CONFIG_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Configuracion`;
const PRODUCTOS_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Productos`;

let TC = parseFloat(localStorage.getItem("tc") || "1200");

let data = [];

const catOrder = ["Accesorios Apple","AirPods","iPad","iPhone","Mac","Apple Watch","Samsung","Xiaomi 4G","Xiaomi 5G","Motorola","Notebooks"];
let categories = ["Todas"];
let activeFilter = "Todas";

const now = new Date();
document.getElementById("fecha-header").textContent =
  "Actualizado: " + now.toLocaleDateString("es-AR", {day:"numeric", month:"long", year:"numeric"}) +
  " · Precios en USD y ARS";

function updateTCDisplay() {
  document.getElementById("tc-nav").textContent = "$" + Math.round(TC).toLocaleString("es-AR");
}

const chipsEl = document.getElementById("chips");
function renderChips(){
chipsEl.innerHTML="";
categories.forEach(cat => {
  const btn = document.createElement("button");
  btn.className = "chip" + (cat === "Todas" ? " active" : "");
  btn.textContent = cat;
  btn.onclick = () => {
    activeFilter = cat;
    document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
    btn.classList.add("active");
    applyFilters();
  };
  chipsEl.appendChild(btn);
});
}

function fmtARS(usd) {
  return "$" + Math.round(usd * TC).toLocaleString("es-AR");
}

function applyFilters() {
  const q = document.getElementById("search").value.toLowerCase().trim();
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";
  const filtered = data.filter(r => {
    const matchCat = activeFilter === "Todas" || r.cat === activeFilter;
    const matchQ = !q || r.name.toLowerCase().includes(q) || r.cat.toLowerCase().includes(q) || r.code.toLowerCase().includes(q);
    return matchCat && matchQ;
  });
  document.getElementById("footer-count").textContent =
    filtered.length + " producto" + (filtered.length !== 1 ? "s" : "") + " mostrado" + (filtered.length !== 1 ? "s" : "");
  if (filtered.length === 0) {
    const tr = document.createElement("tr");
    tr.className = "empty-row";
    tr.innerHTML = '<td colspan="3">Sin resultados.</td>';
    tbody.appendChild(tr);
    return;
  }
  const grouped = {};
  filtered.forEach(r => { if (!grouped[r.cat]) grouped[r.cat] = []; grouped[r.cat].push(r); });
  const catList = catOrder.filter(c => grouped[c]);
  let groupIdx = 0;
  catList.forEach(cat => {
    const catRow = document.createElement("tr");
    catRow.className = "cat-row";
    catRow.innerHTML = `<td colspan="3">${cat}</td>`;
    tbody.appendChild(catRow);
    const cls = groupIdx % 2 === 0 ? "group-a" : "group-b";
    grouped[cat].forEach(r => {
      const tr = document.createElement("tr");
      tr.className = cls;
      tr.innerHTML = `
        <td class="product-cell">${r.name}</td>
        <td class="price-usd">US$ ${r.price.toLocaleString("en-US")}</td>
        <td class="price-ars">${fmtARS(r.price)}</td>
      `;
      tbody.appendChild(tr);
    });
    groupIdx++;
  });
}


async function fetchProductos() {
  try {
    const response = await fetch(PRODUCTOS_URL);
    const csv = await response.text();
    const lines = csv.split("\n");
    data = [];
    for(let i=1;i<lines.length;i++){
      const cols = lines[i].split(",").map(c=>c.replace(/"/g,"").trim());
      if(cols.length<3) continue;
      const precio=parseFloat(cols[2]);
      if(!cols[0]||!cols[1]||isNaN(precio)) continue;
      data.push({cat:cols[0],code:"",name:cols[1],price:precio});
    }
  } catch(e){ console.error(e); }
}

// FUNCIÓN PARA SOLICITAR EL VALOR DEL DÓLAR A GOOGLE SHEETS
async function fetchDolarFromSheet() {
  try {
    const response = await fetch(CONFIG_URL);
    if (!response.ok) throw new Error("Error en la conexión con la planilla");
    const text = await response.text();
    
    // Procesa el CSV recibido. Busca el valor en la fila donde dice "Dolar"
    const lines = text.split("\n");
    for (let line of lines) {
      const columns = line.split(",");
      // Limpia comillas que Google suele meter en el CSV exportado
      const key = columns[0]?.replace(/"/g, "").trim();
      const value = columns[1]?.replace(/"/g, "").trim();
      
      if (key && key.toLowerCase() === "dolar") {
        const parsedValue = parseFloat(value);
        if (!isNaN(parsedValue) && parsedValue > 0) {
          TC = parsedValue;
          localStorage.setItem("tc", TC); // Guarda en memoria local por seguridad
          break;
        }
      }
    }
  } catch (error) {
    console.error("No se pudo obtener el TC online, usando valor de respaldo:", error);
  } finally {
    // Siempre actualiza la pantalla al finalizar el intento de carga
    updateTCDisplay();
    applyFilters();
  }
}

// Inicialización de la página
(async()=>{
 await fetchProductos();
 catOrder.length=0;
 [...new Set(data.map(x=>x.cat))].forEach(c=>catOrder.push(c));
 categories=["Todas",...catOrder];
 renderChips();
 await fetchDolarFromSheet();
})();
</script>
</body>
</html>
